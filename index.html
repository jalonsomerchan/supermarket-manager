<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Supermarket Manager 2D</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-card">
        <canvas id="game" width="960" height="640" aria-label="Supermarket Manager 2D"></canvas>
        <div id="world-labels" class="world-labels"></div>
        <div id="hud" class="hud"></div>
        <div id="touch" class="touch" aria-label="Controles tactiles"></div>
        <div id="toast" class="toast" role="status"></div>
      </section>
      <aside id="panel" class="panel"></aside>
    </main>
    <div id="modal" class="modal hidden"></div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
