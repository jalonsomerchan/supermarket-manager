name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check static app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: npm run check

      - name: Validate static files
        run: |
          test -f index.html
          test -d css
          test -d js
          test -d assets
          grep -q 'css/styles.css' index.html
          grep -q 'js/main.js' index.html
